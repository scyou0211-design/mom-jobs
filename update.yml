name: update-jobs

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs
        env:
          WORK24_API_KEY: ${{ secrets.WORK24_API_KEY }}
        run: python fetch_jobs.py

      - name: Commit jobs.json
        run: |
          if [ ! -f jobs.json ]; then
            echo "jobs.json이 없습니다 (API 키 미설정이거나 응답 없음) — 커밋 건너뜀"
            exit 0
          fi
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add jobs.json
          git commit -m "update jobs $(date +%F)" || echo "변경 없음"
          git push
