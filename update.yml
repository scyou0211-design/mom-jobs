name: update-jobs

on:
  schedule:
    - cron: '0 21 * * *'      # 매일 오전 6시(한국시간) 자동 실행
  workflow_dispatch:           # 버튼으로 수동 실행도 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs
        env:
          WORK24_API_KEY: ${{ secrets.WORK24_API_KEY }}
        run: python fetch_jobs.py

      - name: Commit jobs.json
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add jobs.json
          git commit -m "update jobs $(date +%F)" || echo "변경 없음"
          git push
